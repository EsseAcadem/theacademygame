<!DOCTYPE html>
<html>
<head>
    <title>Essentia Academy Water Shooter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body, html { margin: 0; overflow: hidden; width: 100%; height: 100%; }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #005EB8; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 50; color: white;
            font-family: Arial, sans-serif; text-align: center; padding: 20px;
            box-sizing: border-box;
        }
        .start-btn {
            padding: 15px 30px; font-size: 20px; background: #FFB81C; color: #000;
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px;
            -webkit-tap-highlight-color: transparent;
        }
        
        .ui-container {
            position: absolute; top: 5%; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.95);
            padding: 15px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            font-family: Arial, sans-serif; text-align: center; display: none; z-index: 10;
            box-sizing: border-box;
        }
        
        #arcade-controls {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 150px;
            z-index: 30; display: none; pointer-events: none;
        }
        
        #shoot-btn {
            position: absolute; left: 5%; bottom: 20px; width: 100px;
            padding: 15px 10px; background: #0072CE; color: white; border: 3px solid white;
            border-radius: 10px; font-weight: bold; font-size: 14px; cursor: pointer;
            pointer-events: auto; box-shadow: 0px 5px 0px #003087; text-align: center;
            -webkit-tap-highlight-color: transparent;
        }
        #shoot-btn:active {
            transform: translateY(5px); box-shadow: none; background: #005EB8;
        }

        #fire-hose-visual {
            position: absolute; left: 50%; bottom: 0; transform: translateX(-50%);
            width: 60px; height: 100px;
            background: linear-gradient(to right, #444, #777, #444);
            border: 4px solid #222; border-bottom: none;
            border-radius: 15px 15px 0 0;
            transition: transform 0.1s;
        }
        .hose-firing {
            transform: translateX(-50%) translateY(10px) !important;
        }
        #fire-hose-nozzle {
            position: absolute; top: -20px; left: -2px;
            width: 56px; height: 25px; background: #FFB81C;
            border-radius: 5px; border: 3px solid #b38000;
        }
        #water-spout {
            position: absolute; top: -35px; left: 13px;
            width: 26px; height: 15px; background: #b38000;
            border-radius: 5px 5px 0 0;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="start-screen">
        <h1>EFM Day Shooter</h1>
        <p>Aim your phone and shoot water into the correct bucket!</p>
        <button class="start-btn" onclick="startGame()">Tap to Start</button>
    </div>

    <div class="ui-container" id="quiz-ui">
        <h3 id="question-text" style="margin: 0; font-size: 16px;">Loading...</h3>
    </div>

    <div id="arcade-controls">
        <button id="shoot-btn">SHOOT<br>WATER</button>
        <div id="fire-hose-visual">
            <div id="fire-hose-nozzle"></div>
            <div id="water-spout"></div>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-camera position="0 0 0">
            <a-entity id="aim-raycaster" raycaster="objects: .clickable; showLine: false;" 
                      position="0 0 -1" geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02" 
                      material="color: #FFB81C; shader: flat; opacity: 0.8"></a-entity>
        </a-camera>

        <a-marker preset="hiro" id="ar-marker">
            <a-entity id="game-board">
                
                <a-entity class="clickable bucket-wrapper" id="bucket0" position="-1.5 0 0" geometry="primitive: cylinder; radius: 0.6; height: 1.5" material="visible: false">
                    <a-cylinder class="bucket-shape" radius="0.5" height="1" color="#888888" material="side: double" open-ended="true"></a-cylinder>
                    <a-circle radius="0.5" color="#555" position="0 -0.5 0" rotation="-90 0 0"></a-circle>
                    <a-text class="box-text" value="Opt 1" position="0 1.2 0" align="center" width="4" color="white" look-at="[camera]"></a-text>
                    
                    <a-entity class="water-stream" visible="false">
                        <a-sphere radius="0.15" color="#00BFFF" position="0 0 0" opacity="0.8"></a-sphere>
                        <a-sphere radius="0.15" color="#00BFFF" position="0 0.4 0.4" opacity="0.8"></a-sphere>
                        <a-sphere radius="0.15" color="#00BFFF" position="0 0.8 0.8" opacity="0.8"></a-sphere>
                        <a-sphere radius="0.15" color="#00BFFF" position="0 1.2 1.2" opacity="0.8"></a-sphere>
                    </a-entity>
                    
                    <a-text class="confetti" value="🎉" position="0 0 0" scale="4 4 4" align="center" visible="false" look-at="[camera]"></a-text>
                    <a-text class="sad-face" value="😢" position="0 0 0" scale="4 4 4" align="center" visible="false" look-at="[camera]"></a-text>
                </a-entity>

                <a-entity class="clickable bucket-wrapper" id="bucket1" position="0 0 -1" geometry="primitive: cylinder; radius: 0.6; height: 1.5" material="visible: false">
                    <a-cylinder class="bucket-shape" radius="0.5" height="1" color="#888888" material="side: double" open-ended="true"></a-cylinder>
                    <a-circle radius="0.5" color="#555" position="0 -0.5 0" rotation="-90 0 0"></a-circle>
                    <a-text class="box-text" value="Opt 2" position="0 1.2 0" align="center" width="4" color="white" look-at="[camera]"></a-text>
                    
                    <a-entity class="water-stream" visible="false">
                        <a-sphere radius="0.15" color="#00BFFF" position="0 0 0" opacity="0.8"></a-sphere>
                        <a-sphere radius="0.15" color="#00BFFF" position="0 0.4 0.4" opacity="0.8"></a-sphere>
                        <a-sphere radius="0.15" color="#00BFFF" position="0 0.8 0.8" opacity="0.8"></a-sphere>
                        <a-sphere radius="0.15" color="#00BFFF" position="0 1.2 1.2" opacity="0.8"></a-sphere>
                    </a-entity>
                    
                    <a-text class="confetti" value="🎉" position="0 0 0" scale="4 4 4" align="center" visible="false" look-at="[camera]"></a-text>
                    <a-text class="sad-face" value="😢" position="0 0 0" scale="4 4 4" align="center" visible="false" look-at="[camera]"></a-text>
                </a-entity>

                <a-entity class="clickable bucket-wrapper" id="bucket2" position="1.5 0 0" geometry="primitive: cylinder; radius: 0.6; height: 1.5" material="visible: false">
                    <a-cylinder class="bucket-shape" radius="0.5" height="1" color="#888888" material="side: double" open-ended="true"></a-cylinder>
                    <a-circle radius="0.5" color="#555" position="0 -0.5 0" rotation="-90 0 0"></a-circle>
                    <a-text class="box-text" value="Opt 3" position="0 1.2 0" align="center" width="4" color="white" look-at="[camera]"></a-text>
                    
                    <a-entity class="water-stream" visible="false">
                        <a-sphere radius="0.15" color="#00BFFF" position="0 0 0" opacity="0.8"></a-sphere>
                        <a-sphere radius="0.15" color="#00BFFF" position="0 0.4 0.4" opacity="0.8"></a-sphere>
                        <a-sphere radius="0.15" color="#00BFFF" position="0 0.8 0.8" opacity="0.8"></a-sphere>
                        <a-sphere radius="0.15" color="#00BFFF" position="0 1.2 1.2" opacity="0.8"></a-sphere>
                    </a-entity>
                    
                    <a-text class="confetti" value="🎉" position="0 0 0" scale="4 4 4" align="center" visible="false" look-at="[camera]"></a-text>
                    <a-text class="sad-face" value="😢" position="0 0 0" scale="4 4 4" align="center" visible="false" look-at="[camera]"></a-text>
                </a-entity>
            </a-entity>
        </a-marker>
    </a-scene>

    <script>
        let audioCtx;
        function initAudio() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        // New Hose Spray Sound Engine
        function playHoseSound(duration) {
            if(!audioCtx) return;
            const bufferSize = audioCtx.sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1; // Creates white noise
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass'; // Muffles it to sound like water pressure
            filter.frequency.value = 600; 
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
        }

        function playTone(freq, type, duration) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.value = freq;
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            setTimeout(() => osc.stop(), duration * 1000);
        }
        function playDing() { playTone(800, 'sine', 0.1); setTimeout(() => playTone(1200, 'sine', 0.3), 100); }
        function playBuzzer() { playTone(150, 'sawtooth', 0.4); }

        const quizData = [
            { question: "What does EFM stand for?", options: ["Estates &\nFacilities", "Engineering &\nFinance", "Essential\nMaintenance"], answer: 0 },
            { question: "How long is a Level 3 Apprenticeship?", options: ["6 months", "12 months", "18-24\nmonths"], answer: 2 },
            { question: "When was St Thomas' Hospital founded?", options: ["1850", "1173", "1948"], answer: 1 }
        ];

        let currentQ = 0;
        let score = 0;
        let isWaiting = false;

        const marker = document.querySelector('#ar-marker');
        const quizUI = document.querySelector('#quiz-ui');
        const arcadeControls = document.querySelector('#arcade-controls');
        const questionText = document.querySelector('#question-text');
        
        const shootBtn = document.querySelector('#shoot-btn');
        const fireHoseVisual = document.querySelector('#fire-hose-visual');
        const aimRaycaster = document.querySelector('#aim-raycaster');

        const shapes = document.querySelectorAll('.bucket-shape');
        const texts = document.querySelectorAll('.box-text');
        const streams = document.querySelectorAll('.water-stream');
        const confettis = document.querySelectorAll('.confetti');
        const sadFaces = document.querySelectorAll('.sad-face');

        function startGame() {
            document.querySelector('#start-screen').style.display = 'none';
            initAudio();
        }

        marker.addEventListener('markerFound', () => {
            if (currentQ < quizData.length) {
                quizUI.style.display = 'block';
                arcadeControls.style.display = 'flex';
                if (!isWaiting) loadQuestion();
            }
        });

        marker.addEventListener('markerLost', () => {
            quizUI.style.display = 'none';
            arcadeControls.style.display = 'none';
        });

        function loadQuestion() {
            isWaiting = false;
            const q = quizData[currentQ];
            questionText.innerText = q.question;
            
            shapes.forEach((shape, i) => {
                shape.setAttribute('color', '#888888');
                texts[i].setAttribute('value', q.options[i]);
                confettis[i].setAttribute('visible', 'false');
                confettis[i].removeAttribute('animation');
                sadFaces[i].setAttribute('visible', 'false');
                sadFaces[i].removeAttribute('animation');
                streams[i].setAttribute('visible', 'false');
                streams[i].removeAttribute('animation__pos');
                streams[i].removeAttribute('animation__scale');
            });
        }

        shootBtn.addEventListener('click', () => {
            if (isWaiting) return;
            
            const hits = aimRaycaster.components.raycaster.intersectedEls;
            
            // Physical recoil animation on the 2D hose UI
            fireHoseVisual.classList.add('hose-firing');
            setTimeout(() => fireHoseVisual.classList.remove('hose-firing'), 150);

            // If user misses, just spray water briefly
            if (hits.length === 0) {
                playHoseSound(0.2); 
                return; 
            }
            
            isWaiting = true;
            playHoseSound(0.5); // Full water spray sound
            
            const targetBucket = hits[0];
            const index = parseInt(targetBucket.id.replace('bucket', ''));

            // 3D Water shoots from the camera's general direction into the bucket
            const stream = streams[index];
            stream.setAttribute('visible', 'true');
            stream.setAttribute('animation__pos', 'property: position; from: 0 0 5; to: 0 0 0; dur: 400; easing: linear');
            stream.setAttribute('animation__scale', 'property: scale; from: 0.1 0.1 0.1; to: 1 1 1; dur: 400; easing: easeOutQuad');

            setTimeout(() => {
                stream.setAttribute('visible', 'false');

                if (index === quizData[currentQ].answer) {
                    score++;
                    playDing();
                    shapes[index].setAttribute('color', '#00A9CE'); 
                    confettis[index].setAttribute('visible', 'true');
                    confettis[index].setAttribute('animation', 'property: position; from: 0 0 0; to: 0 1.5 0; dur: 800; easing: easeOutQuad');
                } else {
                    playBuzzer();
                    shapes[index].setAttribute('color', '#DA291C'); 
                    sadFaces[index].setAttribute('visible', 'true');
                    sadFaces[index].setAttribute('animation', 'property: position; from: 0 0 0; to: 0 1.5 0; dur: 800; easing: easeOutQuad');

                    const correctIdx = quizData[currentQ].answer;
                    shapes[correctIdx].setAttribute('color', '#00A9CE');
                }
                
                setTimeout(() => {
                    currentQ++;
                    if (currentQ < quizData.length) {
                        loadQuestion();
                    } else {
                        quizUI.innerHTML = `<h3 style="margin: 0; font-size: 16px;">Game Over!</h3><p style="margin: 5px 0 0 0;">Your score: ${score} / ${quizData.length}</p>`;
                        arcadeControls.style.display = 'none';
                        document.querySelector('#game-board').setAttribute('visible', 'false');
                    }
                }, 2500); 
                
            }, 400); 
        });
    </script>
</body>
</html>
