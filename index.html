<!DOCTYPE html>
<html>
<head>
    <title>Essentia Academy Water Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        body, html { 
            margin: 0; overflow: hidden; width: 100%; height: 100%; 
            font-family: 'Inter', -apple-system, sans-serif; 
            -webkit-user-select: none; user-select: none; 
        }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #005EB8, #00A9CE);
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 9999; color: white; text-align: center; padding: 20px; box-sizing: border-box;
            touch-action: none; 
        }
        #start-btn {
            padding: 16px 40px; font-size: 18px; background: white; color: #005EB8;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        #start-btn:active { transform: scale(0.95); }
        
        .ui-container {
            position: absolute; top: max(5%, env(safe-area-inset-top)); 
            left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 450px; 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.5); border-radius: 20px;
            padding: 20px; box-shadow: 0 12px 35px rgba(0,0,0,0.15);
            text-align: center; display: none; z-index: 10; box-sizing: border-box;
        }
        #question-text { margin: 0; font-size: 18px; color: #111; font-weight: 700; line-height: 1.4; }
        
        #arcade-controls {
            position: absolute; bottom: 0; left: 0; width: 100%; 
            height: calc(140px + env(safe-area-inset-bottom));
            z-index: 30; display: none; pointer-events: none;
            touch-action: none; 
        }
        
        #shoot-btn {
            position: absolute; left: 5%; bottom: max(30px, env(safe-area-inset-bottom));
            padding: 18px 20px; background: linear-gradient(135deg, #00BFFF, #0072CE); 
            color: white; border: none; border-radius: 50px; 
            font-weight: bold; font-size: 14px; letter-spacing: 1px; cursor: pointer;
            pointer-events: auto; box-shadow: 0 8px 25px rgba(0, 114, 206, 0.4); 
            text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px;
            -webkit-tap-highlight-color: transparent; touch-action: none;
        }
        #shoot-btn:active { transform: scale(0.92); }

        #fire-hose-visual {
            position: absolute; left: 50%; bottom: -10px; transform: translateX(-50%);
            width: 50px; height: 110px;
            background: linear-gradient(to right, #2c3e50, #34495e, #2c3e50);
            border-radius: 25px 25px 0 0; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }
        .hose-firing { transform: translateX(-50%) translateY(8px) !important; }
        #fire-hose-nozzle {
            position: absolute; top: -15px; left: -5px;
            width: 60px; height: 20px; background: #FFB81C;
            border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        #water-spout {
            position: absolute; top: -25px; left: 15px;
            width: 20px; height: 10px; background: #222;
            border-radius: 5px 5px 0 0;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="start-screen">
        <img src="https://raw.githubusercontent.com/EsseAcadem/theacademygame/668e6854f8df8913447aac80b8d5d5b403ed228d/shade_1.png" alt="Essentia Academy Logo" style="max-width: 220px; margin-bottom: 25px; border-radius: 10px;">
        <h1 style="margin-bottom: 10px;">EFM Day Game</h1>
        <p style="margin: 0 20px; opacity: 0.9; line-height: 1.5;">Aim the yellow crosshair, then press and hold <strong>SPRAY</strong> to fill the correct bucket.</p>
        <button id="start-btn">Start Playing</button>
    </div>

    <div class="ui-container" id="quiz-ui">
        <h3 id="question-text">Loading...</h3>
    </div>

    <div id="arcade-controls">
        <button id="shoot-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 21.5C16.1421 21.5 19.5 18.1421 19.5 14C19.5 9.5 12 2.5 12 2.5C12 2.5 4.5 9.5 4.5 14C4.5 18.1421 7.85786 21.5 12 21.5Z"/>
            </svg>
            SPRAY
        </button>
        <div id="fire-hose-visual">
            <div id="fire-hose-nozzle"></div>
            <div id="water-spout"></div>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false" renderer="antialias: true; alpha: true;">
        
        <a-camera position="0 0 0">
            <a-entity id="aim-raycaster" raycaster="objects: .clickable; showLine: false;" 
                      position="0 0 -1" geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.025" 
                      material="color: #FFB81C; shader: flat; opacity: 0.8"></a-entity>
            
            <a-entity id="water-particles">
                <a-sphere class="water-drop" radius="0.03" color="#00BFFF" visible="false" material="opacity: 0.8; transparent: true; roughness: 0"></a-sphere>
                <a-sphere class="water-drop" radius="0.04" color="#00A9CE" visible="false" material="opacity: 0.8; transparent: true; roughness: 0"></a-sphere>
                <a-sphere class="water-drop" radius="0.03" color="#00BFFF" visible="false" material="opacity: 0.8; transparent: true; roughness: 0"></a-sphere>
                <a-sphere class="water-drop" radius="0.05" color="#00A9CE" visible="false" material="opacity: 0.8; transparent: true; roughness: 0"></a-sphere>
                <a-sphere class="water-drop" radius="0.03" color="#00BFFF" visible="false" material="opacity: 0.8; transparent: true; roughness: 0"></a-sphere>
                <a-sphere class="water-drop" radius="0.04" color="#00A9CE" visible="false" material="opacity: 0.8; transparent: true; roughness: 0"></a-sphere>
                <a-sphere class="water-drop" radius="0.03" color="#00BFFF" visible="false" material="opacity: 0.8; transparent: true; roughness: 0"></a-sphere>
                <a-sphere class="water-drop" radius="0.05" color="#00A9CE" visible="false" material="opacity: 0.8; transparent: true; roughness: 0"></a-sphere>
            </a-entity>
        </a-camera>

        <a-marker preset="hiro" id="ar-marker">
            <a-entity id="game-board">
                
                <a-entity class="bucket-wrapper" id="bucket0" position="-1.1 0 0">
                    <a-cylinder class="clickable hitbox" radius="0.6" height="1.5" position="0 0.2 0" material="opacity: 0; transparent: true"></a-cylinder>
                    <a-cylinder class="bucket-shape" radius="0.45" height="1" color="#E0E0E0" material="side: double; opacity: 0.9; roughness: 0.2" open-ended="true"></a-cylinder>
                    <a-circle radius="0.45" color="#999" position="0 -0.5 0" rotation="-90 0 0"></a-circle>
                    <a-text class="box-text" value="Opt 1" position="0 1.2 0" align="center" width="4" color="white" font="kelsonsans" look-at="[camera]"></a-text>
                    
                    <a-text class="confetti" value="🎉" position="0 0 0" scale="5 5 5" align="center" visible="false" look-at="[camera]"></a-text>
                    <a-text class="sad-face" value="😢" position="0 0 0" scale="5 5 5" align="center" visible="false" look-at="[camera]"></a-text>
                </a-entity>

                <a-entity class="bucket-wrapper" id="bucket1" position="0 0 -1">
                    <a-cylinder class="clickable hitbox" radius="0.6" height="1.5" position="0 0.2 0" material="opacity: 0; transparent: true"></a-cylinder>
                    <a-cylinder class="bucket-shape" radius="0.45" height="1" color="#E0E0E0" material="side: double; opacity: 0.9; roughness: 0.2" open-ended="true"></a-cylinder>
                    <a-circle radius="0.45" color="#999" position="0 -0.5 0" rotation="-90 0 0"></a-circle>
                    <a-text class="box-text" value="Opt 2" position="0 1.2 0" align="center" width="4" color="white" font="kelsonsans" look-at="[camera]"></a-text>
                    
                    <a-text class="confetti" value="🎉" position="0 0 0" scale="5 5 5" align="center" visible="false" look-at="[camera]"></a-text>
                    <a-text class="sad-face" value="😢" position="0 0 0" scale="5 5 5" align="center" visible="false" look-at="[camera]"></a-text>
                </a-entity>

                <a-entity class="bucket-wrapper" id="bucket2" position="1.1 0 0">
                    <a-cylinder class="clickable hitbox" radius="0.6" height="1.5" position="0 0.2 0" material="opacity: 0; transparent: true"></a-cylinder>
                    <a-cylinder class="bucket-shape" radius="0.45" height="1" color="#E0E0E0" material="side: double; opacity: 0.9; roughness: 0.2" open-ended="true"></a-cylinder>
                    <a-circle radius="0.45" color="#999" position="0 -0.5 0" rotation="-90 0 0"></a-circle>
                    <a-text class="box-text" value="Opt 3" position="0 1.2 0" align="center" width="4" color="white" font="kelsonsans" look-at="[camera]"></a-text>
                    
                    <a-text class="confetti" value="🎉" position="0 0 0" scale="5 5 5" align="center" visible="false" look-at="[camera]"></a-text>
                    <a-text class="sad-face" value="😢" position="0 0 0" scale="5 5 5" align="center" visible="false" look-at="[camera]"></a-text>
                </a-entity>
            </a-entity>
        </a-marker>
    </a-scene>

    <script>
        let audioCtx;
        let hoseNoiseNode, hoseGainNode;

        function initAudio() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function startHoseSound() {
            if(!audioCtx) return;
            const bufferSize = audioCtx.sampleRate * 2; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
            
            hoseNoiseNode = audioCtx.createBufferSource();
            hoseNoiseNode.buffer = buffer;
            hoseNoiseNode.loop = true; 
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass'; 
            filter.frequency.value = 500; 
            
            hoseGainNode = audioCtx.createGain();
            hoseGainNode.gain.setValueAtTime(0, audioCtx.currentTime); 
            hoseGainNode.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.1); 
            
            hoseNoiseNode.connect(filter);
            filter.connect(hoseGainNode);
            hoseGainNode.connect(audioCtx.destination);
            hoseNoiseNode.start();
        }

        function stopHoseSound() {
            if(hoseGainNode && hoseNoiseNode) {
                hoseGainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1); 
                setTimeout(() => { if(hoseNoiseNode) hoseNoiseNode.stop(); }, 100);
            }
        }

        function playTone(freq, type, duration) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.value = freq;
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            setTimeout(() => osc.stop(), duration * 1000);
        }
        function playDing() { playTone(800, 'sine', 0.1); setTimeout(() => playTone(1200, 'sine', 0.4), 100); }
        function playBuzzer() { playTone(150, 'sawtooth', 0.4); }

        const quizData = [
            { question: "What does EFM stand for?", options: ["Estates &\nFacilities", "Engineering &\nFinance", "Essential\nMaintenance"], answer: 0 },
            { question: "How long is a Level 3 Apprenticeship?", options: ["6 months", "12 months", "18-24\nmonths"], answer: 2 },
            { question: "When was St Thomas' Hospital founded?", options: ["1850", "1173", "1948"], answer: 1 }
        ];

        let currentQ = 0;
        let score = 0;
        let isWaiting = false;
        let isSpraying = false;
        let fillProgress = 0; 
        let hasStarted = false; 

        const marker = document.querySelector('#ar-marker');
        const quizUI = document.querySelector('#quiz-ui');
        const arcadeControls = document.querySelector('#arcade-controls');
        const questionText = document.querySelector('#question-text');
        
        const startBtn = document.querySelector('#start-btn');
        const shootBtn = document.querySelector('#shoot-btn');
        const fireHoseVisual = document.querySelector('#fire-hose-visual');
        const aimRaycaster = document.querySelector('#aim-raycaster');

        const wrappers = [document.querySelector('#bucket0'), document.querySelector('#bucket1'), document.querySelector('#bucket2')];
        const shapes = document.querySelectorAll('.bucket-shape');
        const texts = document.querySelectorAll('.box-text');
        const confettis = document.querySelectorAll('.confetti');
        const sadFaces = document.querySelectorAll('.sad-face');

        function runStartSequence(e) {
            if(e) e.preventDefault();
            if(hasStarted) return;
            hasStarted = true;
            document.querySelector('#start-screen').style.display = 'none';
            initAudio();
        }
        startBtn.addEventListener('click', runStartSequence);
        startBtn.addEventListener('touchstart', runStartSequence, {passive: false});

        const drops = Array.from(document.querySelectorAll('.water-drop')).map(el => ({
            el: el, isActive: false, progress: 0, offsetX: 0, offsetY: 0
        }));

        function renderParticles() {
            if (isSpraying) {
                if (Math.random() > 0.4) {
                    let drop = drops.find(d => !d.isActive);
                    if (drop) {
                        drop.isActive = true;
                        drop.el.setAttribute('visible', 'true');
                        drop.progress = 0;
                        drop.offsetX = (Math.random() - 0.5) * 0.15;
                        drop.offsetY = (Math.random() - 0.5) * 0.15;
                    }
                }

                if (!isWaiting) {
                    if (aimRaycaster.components.raycaster) {
                        const hits = aimRaycaster.components.raycaster.intersectedEls;
                        if (hits.length > 0) {
                            fillProgress += 16; 
                            if (fillProgress > 600) {
                                processAnswer(hits[0]);
                            }
                        } else {
                            fillProgress = 0; 
                        }
                    }
                }
            } else {
                fillProgress = 0;
            }

            drops.forEach(drop => {
                if (drop.isActive) {
                    drop.progress += 0.08; 
                    
                    let x = drop.offsetX * drop.progress;
                    let y = -1.0 + (drop.progress * 1.2) + drop.offsetY; 
                    let z = -0.3 - (drop.progress * 5); 
                    
                    drop.el.setAttribute('position', `${x} ${y} ${z}`);

                    if (drop.progress > 1) {
                        drop.isActive = false;
                        drop.el.setAttribute('visible', 'false');
                    }
                }
            });

            requestAnimationFrame(renderParticles);
        }
        requestAnimationFrame(renderParticles);


        marker.addEventListener('markerFound', () => {
            if (currentQ < quizData.length) {
                quizUI.style.display = 'block';
                arcadeControls.style.display = 'block';
                if (!isWaiting) loadQuestion();
            }
        });

        marker.addEventListener('markerLost', () => {
            quizUI.style.display = 'none';
            arcadeControls.style.display = 'none';
            if(isSpraying) stopSprayMobileSafe();
        });

        function loadQuestion() {
            isWaiting = false;
            fillProgress = 0;
            const q = quizData[currentQ];
            questionText.innerText = q.question;
            
            shapes.forEach((shape, i) => {
                shape.setAttribute('color', '#E0E0E0');
                texts[i].setAttribute('value', q.options[i]);
                confettis[i].setAttribute('visible', 'false');
                confettis[i].removeAttribute('animation');
                sadFaces[i].setAttribute('visible', 'false');
                sadFaces[i].removeAttribute('animation');
            });
        }

        function startSpray(e) {
            e.preventDefault();
            if (isWaiting) return;
            isSpraying = true;
            fireHoseVisual.classList.add('hose-firing');
            startHoseSound();
        }

        function stopSpray(e) {
            if(e) e.preventDefault();
            stopSprayMobileSafe();
        }

        function stopSprayMobileSafe() {
            isSpraying = false;
            fireHoseVisual.classList.remove('hose-firing');
            stopHoseSound();
        }

        shootBtn.addEventListener('mousedown', startSpray);
        shootBtn.addEventListener('touchstart', startSpray, {passive: false});
        
        window.addEventListener('mouseup', stopSpray);
        window.addEventListener('touchend', stopSpray);


        function processAnswer(targetHitbox) {
            isWaiting = true;
            stopSprayMobileSafe();
            
            const parentWrapper = targetHitbox.parentElement;
            const index = parseInt(parentWrapper.id.replace('bucket', ''));

            if (index === quizData[currentQ].answer) {
                score++;
                playDing();
                shapes[index].setAttribute('color', '#00A9CE'); 
                confettis[index].setAttribute('visible', 'true');
                confettis[index].setAttribute('animation', 'property: position; from: 0 0 0; to: 0 1.5 0; dur: 800; easing: easeOutQuad');
            } else {
                playBuzzer();
                shapes[index].setAttribute('color', '#DA291C'); 
                sadFaces[index].setAttribute('visible', 'true');
                sadFaces[index].setAttribute('animation', 'property: position; from: 0 0 0; to: 0 1.5 0; dur: 800; easing: easeOutQuad');

                const correctIdx = quizData[currentQ].answer;
                shapes[correctIdx].setAttribute('color', '#00A9CE');
            }
            
            setTimeout(() => {
                currentQ++;
                if (currentQ < quizData.length) {
                    loadQuestion();
                } else {
                    quizUI.innerHTML = `<h3 style="margin: 0; font-size: 18px; color: #005EB8;">Game Over!</h3><p style="margin: 10px 0 0 0; font-weight: bold;">Your score: ${score} / ${quizData.length}</p>`;
                    arcadeControls.style.display = 'none';
                    document.querySelector('#game-board').setAttribute('visible', 'false');
                }
            }, 2500); 
        }
    </script>
</body>
</html>
